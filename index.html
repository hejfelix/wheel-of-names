<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎡 Wheel of Names</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      text-align: center;
      padding: 24px 16px 8px;
      font-size: 2.4rem;
      background: linear-gradient(90deg, #f7971e, #ffd200, #f7971e);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      to {
        background-position: 200% center;
      }
    }

    .app {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      padding: 16px 24px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ---- Wheel column ---- */
    .wheel-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .wheel-wrapper {
      position: relative;
      width: 480px;
      height: 480px;
    }

    canvas {
      width: 480px;
      height: 480px;
      filter: drop-shadow(0 0 30px rgba(255, 210, 0, .35));
      transition: filter .3s;
    }

    canvas.spinning {
      filter: drop-shadow(0 0 50px rgba(255, 210, 0, .7));
    }

    .pointer {
      position: absolute;
      top: 50%;
      right: -18px;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 22px solid transparent;
      border-bottom: 22px solid transparent;
      border-right: 36px solid #ffd200;
      filter: drop-shadow(-3px 0 6px rgba(0, 0, 0, .5));
      z-index: 2;
    }

    #spinBtn {
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      padding: 14px 48px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #302b63;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255, 210, 0, .4);
      transition: transform .15s, box-shadow .15s;
    }

    #spinBtn:hover:not(:disabled) {
      transform: scale(1.06);
      box-shadow: 0 6px 30px rgba(255, 210, 0, .6);
    }

    #spinBtn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    #newSeedBtn:hover:not(:disabled) {
      transform: scale(1.06);
      box-shadow: 0 6px 30px rgba(78, 205, 196, .6);
    }

    #newSeedBtn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    /* ---- Seed display ---- */
    .seed-area {
      text-align: center;
      min-height: 90px;
    }

    .seed-box {
      display: none;
      background: rgba(255, 255, 255, .08);
      border: 2px solid #ffd200;
      border-radius: 14px;
      padding: 14px 24px;
      margin-top: 6px;
      backdrop-filter: blur(6px);
    }

    .seed-box.visible {
      display: block;
      animation: popIn .4s ease;
    }

    @keyframes popIn {
      from {
        transform: scale(.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .seed-label {
      font-size: .85rem;
      color: #aaa;
      margin-bottom: 4px;
    }

    .seed-value {
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      color: #ffd200;
      letter-spacing: 2px;
      word-break: break-all;
      user-select: all;
    }

    .seed-copy {
      font-size: .8rem;
      color: #888;
      margin-top: 4px;
    }

    /* ---- Winner banner ---- */
    .winner-banner {
      display: none;
      text-align: center;
      animation: popIn .5s ease;
    }

    .winner-banner.visible {
      display: block;
    }

    .winner-banner .label {
      font-size: 1rem;
      color: #aaa;
    }

    .winner-banner .name {
      font-family: 'Fredoka One', cursive;
      font-size: 2.2rem;
      color: #ffd200;
      text-shadow: 0 0 20px rgba(255, 210, 0, .6);
    }

    /* ---- Verify seed section ---- */
    .verify-section {
      margin-top: 8px;
      text-align: center;
    }

    .verify-section summary {
      cursor: pointer;
      color: #aaa;
      font-size: .85rem;
    }

    .verify-section summary:hover {
      color: #ffd200;
    }

    .verify-inputs {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .verify-inputs input {
      font-family: 'Nunito', sans-serif;
      padding: 8px 14px;
      border-radius: 10px;
      border: 2px solid #555;
      background: rgba(255, 255, 255, .06);
      color: #fff;
      font-size: .95rem;
      width: 200px;
    }

    .verify-inputs input:focus {
      border-color: #ffd200;
      outline: none;
    }

    .verify-inputs button {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      padding: 8px 18px;
      border-radius: 10px;
      border: none;
      background: #ffd200;
      color: #302b63;
      cursor: pointer;
      font-size: .95rem;
    }

    /* ---- Names panel ---- */
    .names-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 260px;
      max-width: 320px;
    }

    .names-col h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: #ffd200;
    }

    #nameInput {
      font-family: 'Nunito', sans-serif;
      padding: 10px 14px;
      border-radius: 12px;
      border: 2px solid #555;
      background: rgba(255, 255, 255, .06);
      color: #fff;
      font-size: 1rem;
      width: 100%;
    }

    #nameInput:focus {
      border-color: #ffd200;
      outline: none;
    }

    .add-row {
      display: flex;
      gap: 8px;
    }

    .add-row button,
    .action-btn {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 10px;
      border: none;
      background: #ffd200;
      color: #302b63;
      cursor: pointer;
      font-size: .9rem;
      white-space: nowrap;
    }

    .add-row button:hover,
    .action-btn:hover {
      background: #f7971e;
    }

    .names-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 340px;
      overflow-y: auto;
      padding-right: 6px;
    }

    .names-list::-webkit-scrollbar {
      width: 6px;
    }

    .names-list::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 3px;
    }

    .names-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, .07);
      padding: 8px 14px;
      border-radius: 10px;
      border-left: 4px solid var(--clr);
    }

    .names-list li .remove-btn {
      background: none;
      border: none;
      color: #f44;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 4px;
    }

    .name-count {
      font-size: .85rem;
      color: #888;
    }

    /* ---- Confetti canvas ---- */
    #confettiCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }

    /* ---- Volume control ---- */
    .volume-control {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .85rem;
      color: #aaa;
    }

    .volume-control input[type=range] {
      width: 80px;
      accent-color: #ffd200;
    }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {

      .wheel-wrapper,
      canvas {
        width: 320px;
        height: 320px;
      }

      h1 {
        font-size: 1.6rem;
      }

      .app {
        gap: 20px;
        padding: 12px;
      }
    }
  </style>
</head>

<body>

  <h1>🎡 Wheel of Names</h1>

  <div class="app">
    <!-- Wheel column -->
    <div class="wheel-col">
      <div class="wheel-wrapper">
        <canvas id="wheelCanvas" width="960" height="960"></canvas>
        <div class="pointer"></div>
      </div>

      <div class="volume-control">
        🔊 <input type="range" id="volumeSlider" min="0" max="100" value="60"> <span id="volLabel">60%</span>
      </div>

      <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
        <button id="newSeedBtn"
          style="font-family:'Fredoka One',cursive;font-size:1.4rem;padding:14px 48px;border:none;border-radius:50px;background:linear-gradient(135deg,#4ECDC4,#45B7D1);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(78,205,196,.4);transition:transform .15s,box-shadow .15s;">🎲
          New Seed &amp; Spin</button>
        <button id="spinBtn" disabled>🔁 Re-spin with Current Seed</button>
      </div>

      <div class="winner-banner" id="winnerBanner">
        <div class="label">🏆 Winner:</div>
        <div class="name" id="winnerName"></div>
      </div>

      <div class="seed-area">
        <div class="seed-box" id="seedBox">
          <div class="seed-label">🔑 RNG Seed (click to copy)</div>
          <div class="seed-value" id="seedValue" title="Click to copy"></div>
          <div class="seed-copy" id="seedCopyMsg">Click seed to copy to clipboard</div>
        </div>
      </div>

      <details class="verify-section">
        <summary>🔍 Verify a spin result</summary>
        <div class="verify-inputs">
          <input type="text" id="verifySeed" placeholder="Paste seed here">
          <button onclick="verifySpin()">Verify</button>
        </div>
        <div id="verifyResult" style="margin-top:8px; font-size:.9rem;"></div>
      </details>
    </div>

    <!-- Names column -->
    <div class="names-col">
      <h2>📝 Participants</h2>
      <div class="add-row">
        <input type="text" id="nameInput" placeholder="Enter a name…">
        <button onclick="addName()">Add</button>
      </div>
      <div style="display:flex; gap:8px; align-self:flex-start; flex-wrap:wrap;">
        <button class="action-btn" onclick="shuffleNames()">🔀 Shuffle</button>
        <button class="action-btn" onclick="copyShareLink()">🔗 Share Link</button>
      </div>
      <div class="name-count"><span id="nameCount">0</span> names on the wheel</div>
      <div id="shareLinkMsg" style="font-size:.8rem;color:#4ECDC4;min-height:1.2em;"></div>
      <ul class="names-list" id="namesList"></ul>
    </div>
  </div>

  <canvas id="confettiCanvas"></canvas>

  <script>
    // ========== Seeded PRNG (Mulberry32) ==========
    function mulberry32(seed) {
      return function () {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    // ========== Color Palette ==========
    const COLORS = [
      '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
      '#F06292', '#AED581', '#FFD54F', '#7986CB', '#FF8A65',
      '#80DEEA', '#CE93D8', '#A5D6A7', '#FFAB91', '#81D4FA',
      '#EF5350', '#26C6DA', '#66BB6A', '#FFA726', '#AB47BC',
      '#29B6F6', '#EC407A', '#8D6E63', '#78909C', '#D4E157',
    ];

    // ========== State ==========
    let names = ['Alice', 'Bob', 'Charlie', 'Diana', 'Eve', 'Frank', 'Grace', 'Hank'];
    let spinning = false;
    let currentAngle = 0;
    let lastSeed = null;
    let lastWinner = null;

    // ========== DOM refs ==========
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const nameInput = document.getElementById('nameInput');
    const namesList = document.getElementById('namesList');
    const nameCountEl = document.getElementById('nameCount');
    const winnerBanner = document.getElementById('winnerBanner');
    const winnerNameEl = document.getElementById('winnerName');
    const seedBox = document.getElementById('seedBox');
    const seedValueEl = document.getElementById('seedValue');
    const seedCopyMsg = document.getElementById('seedCopyMsg');
    const volumeSlider = document.getElementById('volumeSlider');
    const volLabel = document.getElementById('volLabel');
    const confettiCanvas = document.getElementById('confettiCanvas');
    const confCtx = confettiCanvas.getContext('2d');

    // ========== Audio (Web Audio API) ==========
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function getVolume() {
      return volumeSlider.value / 100;
    }

    volumeSlider.addEventListener('input', () => {
      volLabel.textContent = volumeSlider.value + '%';
    });

    function playTick() {
      const ctx = getAudioCtx();
      const vol = getVolume();
      if (vol === 0) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1800 + Math.random() * 400, ctx.currentTime);
      gain.gain.setValueAtTime(vol * 0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.06);
    }

    function playWinSound() {
      const ctx = getAudioCtx();
      const vol = getVolume();
      if (vol === 0) return;
      const notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.12);
        gain.gain.setValueAtTime(vol * 0.2, ctx.currentTime + i * 0.12);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.4);
        osc.start(ctx.currentTime + i * 0.12);
        osc.stop(ctx.currentTime + i * 0.12 + 0.4);
      });

      // Bonus shimmer
      setTimeout(() => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1568, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(2093, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(vol * 0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);
      }, 500);
    }

    function playClickSound() {
      const ctx = getAudioCtx();
      const vol = getVolume();
      if (vol === 0) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      gain.gain.setValueAtTime(vol * 0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.04);
    }

    // ========== Draw Wheel ==========
    function drawWheel(angle) {
      const W = canvas.width, H = canvas.height;
      const cx = W / 2, cy = H / 2, R = W / 2 - 20;
      ctx.clearRect(0, 0, W, H);

      if (names.length === 0) {
        ctx.fillStyle = '#444';
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#888';
        ctx.font = '32px Nunito';
        ctx.textAlign = 'center';
        ctx.fillText('Add names to begin!', cx, cy);
        return;
      }

      const sliceAngle = (Math.PI * 2) / names.length;

      // Draw outer glow ring
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, R + 8, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255, 210, 0, 0.3)';
      ctx.lineWidth = 6;
      ctx.stroke();
      ctx.restore();

      names.forEach((name, i) => {
        const startAngle = angle + i * sliceAngle;
        const endAngle = startAngle + sliceAngle;
        const color = COLORS[i % COLORS.length];

        // Slice
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, R, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();

        // Border
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Text
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(startAngle + sliceAngle / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.shadowColor = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur = 4;

        const fontSize = names.length <= 8 ? 28 : names.length <= 16 ? 20 : 14;
        ctx.font = `bold ${fontSize}px Nunito`;

        const maxWidth = R * 0.7;
        let displayName = name;
        if (ctx.measureText(displayName).width > maxWidth) {
          while (ctx.measureText(displayName + '…').width > maxWidth && displayName.length > 1) {
            displayName = displayName.slice(0, -1);
          }
          displayName += '…';
        }

        ctx.fillText(displayName, R - 20, fontSize / 3);
        ctx.restore();
      });

      // Center cap
      const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, 42);
      gradient.addColorStop(0, '#ffd200');
      gradient.addColorStop(1, '#f7971e');
      ctx.beginPath();
      ctx.arc(cx, cy, 38, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.strokeStyle = '#302b63';
      ctx.lineWidth = 4;
      ctx.stroke();

      // Dot markers around edge
      for (let i = 0; i < names.length; i++) {
        const a = angle + i * sliceAngle;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * (R - 6), cy + Math.sin(a) * (R - 6), 4, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }
    }

    // ========== Get winner at pointer ==========
    function getWinnerAtAngle(angle) {
      // Pointer is on the right side (angle = 0)
      const sliceAngle = (Math.PI * 2) / names.length;
      // Normalize angle to [0, 2*PI)
      let normalizedAngle = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      // The pointer is at 0 radians (right). The winning slice is the one at angle 2*PI - normalizedAngle
      let pointerAngle = (Math.PI * 2 - normalizedAngle) % (Math.PI * 2);
      let index = Math.floor(pointerAngle / sliceAngle);
      return { index: index % names.length, name: names[index % names.length] };
    }

    // ========== Spin button state ==========
    function updateSpinBtnState() {
      spinBtn.disabled = lastSeed == null;
    }

    // ========== Spin logic ==========
    function spin(seedOverride) {
      if (spinning || names.length < 2) return;

      // Reuse existing seed, or use override, or generate new
      const seed = seedOverride != null ? seedOverride : (lastSeed != null ? lastSeed : Date.now());
      lastSeed = seed;
      updateSpinBtnState();

      // Reset wheel to angle 0 so same seed always produces same result
      currentAngle = 0;
      const rng = mulberry32(seed);

      // Consume a few values to warm up the PRNG
      rng(); rng(); rng();

      // Determine spin parameters
      const totalRotations = 5 + Math.floor(rng() * 5); // 5-9 full rotations
      const extraAngle = rng() * Math.PI * 2; // random final position
      const totalAngle = totalRotations * Math.PI * 2 + extraAngle;
      const duration = 4000 + rng() * 2000; // 4-6 seconds

      spinning = true;
      spinBtn.disabled = true;
      document.getElementById('newSeedBtn').disabled = true;
      canvas.classList.add('spinning');
      winnerBanner.classList.remove('visible');

      // Show seed immediately on spin
      seedValueEl.textContent = seed;
      seedBox.classList.add('visible');
      seedCopyMsg.textContent = 'Click seed to copy to clipboard';

      const startAngle = currentAngle;
      const startTime = performance.now();
      let lastTickSegment = -1;

      function easeOutQuart(t) {
        return 1 - Math.pow(1 - t, 4);
      }

      function animate(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        const eased = easeOutQuart(t);

        currentAngle = startAngle + totalAngle * eased;
        drawWheel(currentAngle);

        // Tick sound on segment change
        const sliceAngle = (Math.PI * 2) / names.length;
        const segment = Math.floor(currentAngle / sliceAngle);
        if (segment !== lastTickSegment) {
          lastTickSegment = segment;
          if (t < 0.95) playTick();
        }

        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          spinning = false;
          spinBtn.disabled = false;
          document.getElementById('newSeedBtn').disabled = false;
          canvas.classList.remove('spinning');

          const winner = getWinnerAtAngle(currentAngle);
          lastWinner = winner.name;

          // Show winner
          winnerNameEl.textContent = winner.name;
          winnerBanner.classList.add('visible');

          playWinSound();
          launchConfetti();
        }
      }

      requestAnimationFrame(animate);
    }

    // ========== Seed display click to copy ==========
    seedValueEl.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(seedValueEl.textContent);
        seedCopyMsg.textContent = '✅ Copied to clipboard!';
        setTimeout(() => { seedCopyMsg.textContent = 'Click seed to copy to clipboard'; }, 2000);
      } catch {
        // fallback
        const range = document.createRange();
        range.selectNodeContents(seedValueEl);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        seedCopyMsg.textContent = 'Selected — press Ctrl+C to copy';
      }
    });

    // ========== Verify ==========
    function verifySpin() {
      const seedStr = document.getElementById('verifySeed').value.trim();
      const resultDiv = document.getElementById('verifyResult');

      if (!seedStr || isNaN(Number(seedStr))) {
        resultDiv.innerHTML = '<span style="color:#f44">Please enter a valid numeric seed.</span>';
        return;
      }

      const seed = Number(seedStr);
      const rng = mulberry32(seed);
      rng(); rng(); rng();

      const totalRotations = 5 + Math.floor(rng() * 5);
      const extraAngle = rng() * Math.PI * 2;
      const totalAngle = totalRotations * Math.PI * 2 + extraAngle;

      // Simulate from angle 0 (verification assumes fresh start — we show what the result would be)
      const finalAngle = totalAngle;
      const sliceAngle = (Math.PI * 2) / names.length;
      let normalizedAngle = ((finalAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      let pointerAngle = (Math.PI * 2 - normalizedAngle) % (Math.PI * 2);
      let index = Math.floor(pointerAngle / sliceAngle) % names.length;

      resultDiv.innerHTML = `<span style="color:#4ECDC4">With seed <strong>${seed}</strong> and current ${names.length} names:<br>` +
        `Winner would be: <strong style="color:#ffd200">${names[index]}</strong> (slot #${index + 1})</span><br>` +
        `<span style="color:#888;font-size:.8rem">Note: Verification assumes the wheel starts from angle 0 with the current name list in order.</span>`;
    }

    // ========== Name management ==========
    function addName() {
      const val = nameInput.value.trim();
      if (!val) return;
      // Sanitize: strip HTML tags
      const clean = val.replace(/<[^>]*>/g, '');
      if (clean.length === 0 || clean.length > 40) return;
      names.push(clean);
      nameInput.value = '';
      playClickSound();
      renderNames();
      drawWheel(currentAngle);
    }

    function removeName(index) {
      names.splice(index, 1);
      renderNames();
      drawWheel(currentAngle);
    }

    function shuffleNames() {
      for (let i = names.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [names[i], names[j]] = [names[j], names[i]];
      }
      playClickSound();
      renderNames();
      drawWheel(currentAngle);
    }

    function renderNames() {
      nameCountEl.textContent = names.length;
      namesList.innerHTML = '';
      names.forEach((name, i) => {
        const li = document.createElement('li');
        li.style.setProperty('--clr', COLORS[i % COLORS.length]);
        const span = document.createElement('span');
        span.textContent = name;
        const btn = document.createElement('button');
        btn.className = 'remove-btn';
        btn.textContent = '✕';
        btn.title = 'Remove';
        btn.onclick = () => removeName(i);
        li.appendChild(span);
        li.appendChild(btn);
        namesList.appendChild(li);
      });
    }

    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addName();
    });

    // ========== Confetti ==========
    let confettiParticles = [];
    let confettiAnimating = false;

    function resizeConfetti() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeConfetti);
    resizeConfetti();

    function launchConfetti() {
      confettiParticles = [];
      const colors = ['#FF6B6B', '#4ECDC4', '#ffd200', '#F06292', '#AED581', '#45B7D1', '#CE93D8', '#FF8A65', '#81D4FA', '#AB47BC'];
      for (let i = 0; i < 200; i++) {
        confettiParticles.push({
          x: confettiCanvas.width / 2 + (Math.random() - 0.5) * 200,
          y: confettiCanvas.height / 2 - 100,
          vx: (Math.random() - 0.5) * 16,
          vy: -Math.random() * 14 - 4,
          w: Math.random() * 10 + 4,
          h: Math.random() * 6 + 2,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.3,
          gravity: 0.18 + Math.random() * 0.08,
          life: 1,
        });
      }
      if (!confettiAnimating) {
        confettiAnimating = true;
        animateConfetti();
      }
    }

    function animateConfetti() {
      confCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      let alive = false;
      confettiParticles.forEach(p => {
        p.vy += p.gravity;
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.99;
        p.rotation += p.rotSpeed;
        p.life -= 0.004;
        if (p.life <= 0) return;
        alive = true;
        confCtx.save();
        confCtx.translate(p.x, p.y);
        confCtx.rotate(p.rotation);
        confCtx.globalAlpha = Math.max(0, p.life);
        confCtx.fillStyle = p.color;
        confCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        confCtx.restore();
      });
      if (alive) {
        requestAnimationFrame(animateConfetti);
      } else {
        confettiAnimating = false;
        confCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      }
    }

    // ========== Query Parameters ==========
    function loadFromQueryParams() {
      const params = new URLSearchParams(window.location.search);

      const namesParam = params.get('names');
      if (namesParam) {
        const parsed = namesParam.split(',').map(n => n.trim().replace(/<[^>]*>/g, '')).filter(n => n.length > 0 && n.length <= 40);
        if (parsed.length > 0) {
          names = parsed;
        }
      }

      const seedParam = params.get('seed');
      if (seedParam && !isNaN(Number(seedParam))) {
        const seed = Number(seedParam);
        lastSeed = seed;
        document.getElementById('verifySeed').value = seedParam;
        seedValueEl.textContent = seed;
        seedBox.classList.add('visible');
      }
    }

    function buildShareUrl(includeSeed) {
      const url = new URL(window.location.pathname, window.location.origin);
      url.searchParams.set('names', names.join(','));
      if (includeSeed && lastSeed != null) {
        url.searchParams.set('seed', lastSeed);
      }
      return url.toString();
    }

    async function copyShareLink() {
      const url = buildShareUrl(lastSeed != null);
      const msgEl = document.getElementById('shareLinkMsg');
      try {
        await navigator.clipboard.writeText(url);
        msgEl.textContent = '✅ Share link copied!';
      } catch {
        msgEl.textContent = url;
      }
      setTimeout(() => { msgEl.textContent = ''; }, 4000);
    }

    // ========== Init ==========
    loadFromQueryParams();
    spinBtn.addEventListener('click', () => spin());
    document.getElementById('newSeedBtn').addEventListener('click', () => {
      lastSeed = null;
      updateSpinBtnState();
      spin();
    });
    renderNames();
    drawWheel(currentAngle);
    updateSpinBtnState();
  </script>
</body>

</html>
